<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuscaOfertas — Melhores Deals do Brasil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;
    --card:#1c1c26;--card2:#22222e;--border:rgba(255,255,255,0.07);
    --accent:#ff6b00;--accent2:#ffb830;
    --ml:#ffe600;--text:#f0f0f5;--muted:#888899;--green:#00e676;
    --radius:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
  header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;}
  .logo{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer;}
  .hero{padding:60px 24px;text-align:center;background:radial-gradient(ellipse at 50% 0%,rgba(255,107,0,0.12) 0%,transparent 70%);}
  .hero h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:800;margin-bottom:12px;}
  .section-wrap{padding:0 24px;max-width:1400px;margin:0 auto 40px;}
  .trends-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
  .trend-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;display:flex;align-items:center;gap:10px;}
  .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
  .product-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;position:relative;}
  .product-img{width:100%;height:180px;object-fit:contain;background:#fff;padding:10px;}
  .product-body{padding:14px;}
  .product-price{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;color:var(--green);margin-bottom:12px;}
  .btn-buy{display:block;width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;text-align:center;text-decoration:none;padding:10px;border-radius:8px;font-weight:600;}
  .overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);padding:24px;align-items:center;justify-content:center;}
  .overlay.open{display:flex;}
  .admin-box{background:var(--bg3);border:1px solid var(--border);border-radius:20px;width:100%;max-width:600px;padding:32px;position:relative;}
  .robot-log{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:.75rem;color:var(--muted);font-family:monospace;max-height:200px;overflow-y:auto;margin-top:15px;}
  .btn-green{background:var(--green);color:#000;padding:10px 20px;border-radius:10px;border:none;font-weight:bold;cursor:pointer;}
  .btn-secondary{background:var(--card2);color:#fff;padding:10px 20px;border-radius:10px;border:1px solid var(--border);cursor:pointer;margin-left:10px;}
  #toast{position:fixed;bottom:24px;right:24px;background:var(--accent);color:#fff;padding:12px 20px;border-radius:10px;display:none;z-index:999;}
</style>
</head>
<body>

<header><div class="logo" id="logoBtn">BuscaOfertas</div></header>

<div class="hero"><h1>As melhores ofertas <em>em um só lugar</em></h1></div>

<div class="section-wrap">
  <h2 style="margin-bottom:15px">🔥 Tendências</h2>
  <div class="trends-grid" id="trendsGrid"></div>
</div>

<div class="section-wrap">
  <h2 style="margin-bottom:15px">⚡ Ofertas <span id="productCount" style="font-size:1rem;opacity:0.5"></span></h2>
  <div class="products-grid" id="productsGrid"></div>
</div>

<div class="overlay" id="loginOverlay">
  <div class="admin-box" style="text-align:center">
    <h2>🔐 Senha Admin</h2>
    <input type="password" id="loginInput" style="width:100%;padding:10px;margin:20px 0;background:#000;color:#fff;border:1px solid var(--border)">
    <button class="btn-green" style="width:100%" onclick="checkLogin()">Entrar</button>
  </div>
</div>

<div class="overlay" id="adminOverlay">
  <div class="admin-box">
    <button style="position:absolute;top:10px;right:10px;color:#fff;background:none;border:none;font-size:20px;cursor:pointer" onclick="closeAdmin()">✕</button>
    <h2>🤖 Controle do Robô</h2>
    <div id="robotStatus" style="margin:15px 0;font-weight:bold;color:var(--accent2)">Status: Parado</div>
    <div class="robot-log" id="robotLog"></div>
    <div style="margin-top:20px">
      <button class="btn-green" onclick="runRobotNow()">⚡ Iniciar Busca Agora</button>
      <button class="btn-secondary" onclick="clearAll()">🗑 Apagar Produtos</button>
      <button class="btn-secondary" onclick="clearRobotLog()">🧹 Limpar Log</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let products = JSON.parse(localStorage.getItem('bo_products')||'[]');
let trendKeywords = [];
let isAdmin = false;

// Ativação Admin (5 cliques no logo)
let lClicks=0, lTimer;
document.getElementById('logoBtn').addEventListener('click',()=>{
  lClicks++; clearTimeout(lTimer);
  lTimer=setTimeout(()=>lClicks=0,2000);
  if(lClicks>=5){ lClicks=0; document.getElementById('loginOverlay').classList.add('open'); }
});

function checkLogin(){
  if(document.getElementById('loginInput').value === 'Busca@2026'){
    document.getElementById('loginOverlay').classList.remove('open');
    openAdmin();
  } else { alert('Senha errada!'); }
}

function openAdmin(){ isAdmin=true; document.getElementById('adminOverlay').classList.add('open'); }
function closeAdmin(){ document.getElementById('adminOverlay').classList.remove('open'); }

async function fetchML(endpoint, params = '') {
    try {
        const response = await fetch(`/api/ml?endpoint=${endpoint}&${params}`);
        const data = await response.json();
        if (data.error) {
            addRobotLog(`❌ Erro da API: ${data.message || data.error}`, 'err');
            return null;
        }
        return data;
    } catch (e) {
        addRobotLog(`❌ Falha na conexão: ${e.message}`, 'err');
        return null;
    }
}

async function loadTrends(){
  const data = await fetchML('trends/MLB');
  if(data && Array.isArray(data)){
    trendKeywords = data.map(d => d.keyword || d).slice(0, 20);
    document.getElementById('trendsGrid').innerHTML = trendKeywords.map((kw, i) => `
      <div class="trend-card"><span style="color:var(--accent);font-weight:bold">${i+1}</span> ${kw}</div>
    `).join('');
  }
}

async function runRobotNow(){
  document.getElementById('robotStatus').textContent = "Status: 🔎 Buscando...";
  addRobotLog('🚀 Iniciando Robô...', 'ok');
  
  const keywords = trendKeywords.length ? trendKeywords.slice(0, 5) : ['celular', 'tv', 'alexa'];
  let added = 0;

  for(const kw of keywords){
    addRobotLog(`Buscando: "${kw}"`);
    const data = await fetchML('sites/MLB/search', `q=${encodeURIComponent(kw)}&limit=1`);
    
    if(data && data.results && data.results.length > 0){
      const r = data.results[0];
      products.unshift({
        id: Date.now() + Math.random(),
        name: r.title,
        price: r.price,
        img: r.thumbnail.replace('I.jpg', 'O.jpg'),
        link: r.permalink
      });
      added++;
      addRobotLog(`✅ Encontrado: ${r.title.substring(0,20)}...`, 'ok');
    } else {
      addRobotLog(`⚠️ Nada encontrado para "${kw}". Verifique os Scopes no Painel ML.`, 'err');
    }
    // Pausa de 2 segundos para evitar bloqueio
    await new Promise(res => setTimeout(res, 2000));
  }

  localStorage.setItem('bo_products', JSON.stringify(products));
  renderProducts();
  document.getElementById('robotStatus').textContent = "Status: Parado";
  toast(`${added} produtos novos!`);
}

function renderProducts(){
  const grid = document.getElementById('productsGrid');
  document.getElementById('productCount').textContent = `(${products.length})`;
  if(!products.length){
    grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;padding:50px;opacity:0.5">Nenhum produto aqui.</p>';
    return;
  }
  grid.innerHTML = products.map(p => `
    <div class="product-card">
      <img class="product-img" src="${p.img}">
      <div class="product-body">
        <div class="product-name">${p.name}</div>
        <div class="product-price">R$ ${p.price.toLocaleString('pt-BR')}</div>
        <a class="btn-buy" href="${p.link}" target="_blank">Ver Oferta</a>
      </div>
    </div>`).join('');
}

function addRobotLog(msg, type){
  const log = document.getElementById('robotLog');
  const div = document.createElement('div');
  div.style.color = type === 'ok' ? '#00e676' : (type === 'err' ? '#ff7c5e' : '#888');
  div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  log.prepend(div);
}

function clearAll(){ if(confirm('Apagar tudo?')){ products=[]; localStorage.setItem('bo_products','[]'); renderProducts(); } }
function clearRobotLog(){ document.getElementById('robotLog').innerHTML = ''; }
function toast(m){ const t=document.getElementById('toast'); t.style.display='block'; t.textContent=m; setTimeout(()=>t.style.display='none',3000); }

window.onload = () => { loadTrends(); renderProducts(); };
</script>
</body>
</html>
