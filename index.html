<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuscaOfertas — Melhores Deals do Brasil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;
    --card:#1c1c26;--card2:#22222e;--border:rgba(255,255,255,0.07);
    --accent:#ff6b00;--accent2:#ffb830;
    --amazon:#ff9900;--ml:#ffe600;--shopee:#ee4d2d;
    --text:#f0f0f5;--muted:#888899;--green:#00e676;
    --radius:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px;}

  header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;}
  .logo{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px;cursor:pointer;user-select:none;}
  .logo span{-webkit-text-fill-color:var(--text);opacity:0.5;font-weight:400;font-size:0.85rem;margin-left:6px;vertical-align:middle;}
  .social-header{display:flex;gap:8px;}
  .social-header a{width:34px;height:34px;border-radius:8px;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:1rem;transition:all .2s;}
  .social-header a:hover{border-color:var(--accent);transform:translateY(-1px);}

  .hero{position:relative;overflow:hidden;padding:60px 24px 50px;text-align:center;background:radial-gradient(ellipse at 50% 0%,rgba(255,107,0,0.12) 0%,transparent 70%);}
  .hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");pointer-events:none;}
  .hero h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:800;line-height:1.1;margin-bottom:12px;}
  .hero h1 em{font-style:normal;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .hero p{color:var(--muted);font-size:1rem;max-width:500px;margin:0 auto 28px;}

  .categories{padding:0 24px 24px;max-width:1400px;margin:0 auto;}
  .cats-scroll{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;}
  .cat-btn{flex-shrink:0;background:var(--card);border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:24px;cursor:pointer;font-size:0.85rem;font-family:inherit;transition:all .2s;white-space:nowrap;}
  .cat-btn:hover,.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

  .section-wrap{padding:0 24px;max-width:1400px;margin:0 auto 40px;}
  .section-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
  .section-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;}
  .section-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}

  .trends-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
  .trend-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;}
  .trend-card:hover{border-color:var(--accent);background:var(--card2);transform:translateY(-2px);}
  .trend-num{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--accent);min-width:24px;}
  .trend-name{font-size:0.82rem;color:var(--text);line-height:1.3;flex:1;}

  .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
  .product-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .25s;cursor:pointer;position:relative;animation:fadeUp .4s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .product-card:hover{border-color:rgba(255,107,0,0.4);transform:translateY(-4px);box-shadow:0 12px 40px rgba(255,107,0,0.12);}
  .product-img{width:100%;height:180px;object-fit:contain;background:#13131a;padding:12px;}
  .product-body{padding:14px;}
  .product-platform{display:inline-flex;align-items:center;gap:5px;font-size:0.72rem;font-weight:600;padding:3px 8px;border-radius:6px;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
  .platform-ml{background:rgba(255,230,0,0.1);color:var(--ml);border:1px solid rgba(255,230,0,0.2);}
  .product-name{font-size:.88rem;font-weight:500;line-height:1.4;color:var(--text);margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .product-price{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;color:var(--green);margin-bottom:12px;}
  .btn-buy{display:block;width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;text-align:center;text-decoration:none;padding:10px;border-radius:8px;font-weight:600;font-size:.85rem;transition:all .2s;border:none;cursor:pointer;font-family:inherit;}
  
  .overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.75);backdrop-filter:blur(10px);overflow-y:auto;padding:24px;align-items:flex-start;justify-content:center;}
  .overlay.open{display:flex;}
  .admin-box{background:var(--bg3);border:1px solid var(--border);border-radius:20px;width:100%;max-width:720px;padding:32px;position:relative;margin:auto;}
  
  .robot-status{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;}
  .robot-dot{width:10px;height:10px;border-radius:50%;background:#555;display:inline-block;margin-right:8px;}
  .robot-dot.on{background:var(--green);box-shadow:0 0 8px var(--green);}
  .robot-dot.busy{background:var(--accent2);animation:pulse 1s infinite;}
  @keyframes pulse{0%{opacity:1}50%{opacity:.5}100%{opacity:1}}
  .robot-log{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:.75rem;color:var(--muted);font-family:monospace;max-height:150px;overflow-y:auto;line-height:1.6;}
  .log-ok{color:var(--green);}
  .log-err{color:#ff7c5e;}
  .robot-controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .control-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;}
  .control-card label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:5px;}
  .control-card select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:5px;}

  .btn-save,.btn-green,.btn-secondary{padding:10px 16px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-weight:600;transition:all .2s;}
  .btn-green{background:rgba(0,230,118,0.1);color:var(--green);border:1px solid rgba(0,230,118,0.3);}
  .btn-secondary{background:var(--card2);color:var(--muted);border:1px solid var(--border);margin-left:8px;}
  #toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:var(--card2);border:1px solid var(--accent);color:var(--text);padding:12px 20px;border-radius:10px;display:none;}
</style>
</head>
<body>

<header><div class="logo" id="logoBtn">BuscaOfertas <span>deals do Brasil</span></div></header>

<div class="hero">
  <h1>As melhores ofertas <em>em um só lugar</em></h1>
  <p>Curadoria de deals do Mercado Livre. Economize tempo e dinheiro.</p>
</div>

<div class="section-wrap">
  <div class="section-header"><span class="section-title">🔥 Tendências em Alta</span><div class="section-line"></div></div>
  <div class="trends-grid" id="trendsGrid"></div>
</div>

<div class="section-wrap">
  <div class="section-header"><span class="section-title">⚡ Ofertas Selecionadas</span><div class="section-line"></div><span id="productCount" class="section-badge">0 produtos</span></div>
  <div class="products-grid" id="productsGrid"></div>
</div>

<div class="overlay" id="loginOverlay">
  <div class="login-box" style="background:var(--bg3);padding:30px;border-radius:20px;text-align:center;">
    <h2>🔐 Login Admin</h2>
    <input class="form-input" type="password" id="loginInput" style="margin:20px 0;width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:#fff;">
    <button class="btn-save" style="background:var(--accent);width:100%;color:#fff;" onclick="checkLogin()">Entrar</button>
  </div>
</div>

<div class="overlay" id="adminOverlay">
  <div class="admin-box">
    <button style="position:absolute;top:10px;right:10px;background:none;border:none;color:#fff;cursor:pointer;font-size:20px;" onclick="closeAdmin()">✕</button>
    <h2 style="margin-bottom:20px;">🤖 Painel do Robô</h2>
    
    <div class="robot-status">
      <div class="robot-dot" id="robotDot"></div> <span id="robotStatusText">Robô parado</span>
      <div class="robot-log" id="robotLog" style="margin-top:10px;">Aguardando início...</div>
    </div>

    <div class="robot-controls">
      <div class="control-card"><label>📦 Produtos por busca</label>
        <select id="robotQty"><option value="3">3 produtos</option><option value="5" selected>5 produtos</option><option value="10">10 produtos</option></select>
      </div>
      <div class="control-card"><label>🏷 Categoria padrão</label>
        <select id="robotCat"><option value="outros">Outros</option><option value="celular">📱 Celular</option><option value="notebook">💻 Notebook</option></select>
      </div>
    </div>

    <div style="margin-top:20px;">
      <button class="btn-green" id="btnRobotToggle" onclick="toggleRobot()">▶ Ativar Robô</button>
      <button class="btn-secondary" onclick="runRobotNow()">⚡ Executar Agora</button>
      <button class="btn-secondary" onclick="clearRobotLog()">🗑 Limpar Log</button>
      <button class="btn-secondary" style="color:#ff7c5e;" onclick="clearAll()">🗑 Apagar Produtos</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let products = JSON.parse(localStorage.getItem('bo_products')||'[]');
let trendKeywords = [];
let robotRunning = false;
let robotTimer = null;
let isAdmin = false;

// LOGIN SECRETO: CLIQUE 5 VEZES NO LOGO
let lClicks=0, lTimer;
document.getElementById('logoBtn').addEventListener('click',()=>{
  lClicks++; clearTimeout(lTimer);
  lTimer=setTimeout(()=>lClicks=0,2000);
  if(lClicks>=5){ lClicks=0; document.getElementById('loginOverlay').classList.add('open'); }
});

function checkLogin(){
  if(document.getElementById('loginInput').value === 'Busca@2026'){
    document.getElementById('loginOverlay').classList.remove('open');
    openAdmin();
  } else { alert('Senha incorreta!'); }
}

function openAdmin(){ isAdmin=true; document.getElementById('adminOverlay').classList.add('open'); renderRobotLog(); }
function closeAdmin(){ document.getElementById('adminOverlay').classList.remove('open'); }

async function fetchML(url){
  try {
    const u = new URL(url);
    const endpoint = u.pathname.replace(/^\//,'');
    const params = u.searchParams.toString();
    const proxyUrl = `/api/ml?endpoint=${endpoint}&${params}`;
    const r = await fetch(proxyUrl);
    return await r.json();
  } catch(e) { console.error(e); return null; }
}

async function loadTrends(){
  const grid = document.getElementById('trendsGrid');
  grid.innerHTML = '<p style="color:var(--muted)">Carregando tendências...</p>';
  const data = await fetchML('https://api.mercadolibre.com/trends/MLB');
  if(data && Array.isArray(data)){
    trendKeywords = data.map(d => d.keyword || d).slice(0, 20);
    grid.innerHTML = trendKeywords.map((kw, i) => `
      <div class="trend-card">
        <div class="trend-num">${i+1}</div>
        <div class="trend-name">${kw}</div>
      </div>`).join('');
  }
}

async function runRobotNow(){
  setRobotStatus(true, true);
  addRobotLog('Iniciando busca real no Mercado Livre...', 'ok');
  
  const qty = parseInt(document.getElementById('robotQty').value);
  const cat = document.getElementById('robotCat').value;
  
  // Se não carregou as tendências, usa uma lista de segurança
  const keywords = trendKeywords.length ? trendKeywords.slice(0, qty) : ['iphone','notebook','fone bluetooth'].slice(0, qty);
  
  let added = 0;
  for(const kw of keywords){
    addRobotLog(`Buscando por: "${kw}"...`);
    const data = await fetchML(`https://api.mercadolibre.com/sites/MLB/search?q=${encodeURIComponent(kw)}&limit=1`);
    
    if(data && data.results && data.results[0]){
      const r = data.results[0];
      const prod = {
        id: Date.now() + Math.random(),
        name: r.title,
        price: r.price,
        img: r.thumbnail.replace('I.jpg', 'O.jpg'),
        link: r.permalink,
        platform: 'ml',
        cat: cat
      };
      products.unshift(prod);
      added++;
      addRobotLog(`✅ Sucesso: ${r.title.substring(0,25)}...`, 'ok');
    } else {
      addRobotLog(`❌ Nada encontrado para: ${kw}`, 'err');
    }
    await new Promise(r => setTimeout(r, 1000)); // Espera 1 seg entre buscas
  }

  localStorage.setItem('bo_products', JSON.stringify(products));
  renderProducts();
  setRobotStatus(robotRunning, false);
  toast(`${added} produtos adicionados!`);
}

function toggleRobot(){
  robotRunning = !robotRunning;
  setRobotStatus(robotRunning);
  if(robotRunning){
    runRobotNow();
    robotTimer = setInterval(runRobotNow, 3600000); // 1 hora
  } else {
    clearInterval(robotTimer);
  }
}

function setRobotStatus(on, busy){
  const dot = document.getElementById('robotDot');
  dot.className = 'robot-dot' + (on ? (busy ? ' busy' : ' on') : '');
  document.getElementById('robotStatusText').textContent = on ? (busy ? 'Buscando agora...' : 'Ativado (Aguardando)') : 'Robô parado';
}

function addRobotLog(msg, type){
  const log = document.getElementById('robotLog');
  const time = new Date().toLocaleTimeString();
  const div = document.createElement('div');
  if(type === 'ok') div.style.color = 'var(--green)';
  if(type === 'err') div.style.color = '#ff7c5e';
  div.textContent = `[${time}] ${msg}`;
  log.prepend(div);
}

function renderProducts(){
  const grid = document.getElementById('productsGrid');
  document.getElementById('productCount').textContent = `${products.length} produtos`;
  if(!products.length){
    grid.innerHTML = '<p style="padding:40px;text-align:center;color:var(--muted);grid-column:1/-1;">Nenhum produto cadastrado.</p>';
    return;
  }
  grid.innerHTML = products.map(p => `
    <div class="product-card">
      <img class="product-img" src="${p.img}">
      <div class="product-body">
        <div class="product-platform platform-ml">🛒 Mercado Livre</div>
        <div class="product-name">${p.name}</div>
        <div class="product-price">R$ ${p.price.toLocaleString('pt-BR', {minimumFractionDigits:2})}</div>
        <a class="btn-buy" href="${p.link}" target="_blank">Ver Oferta →</a>
      </div>
    </div>`).join('');
}

function clearAll(){ if(confirm('Apagar tudo?')){ products=[]; localStorage.setItem('bo_products','[]'); renderProducts(); } }
function clearRobotLog(){ document.getElementById('robotLog').innerHTML = ''; }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }

document.addEventListener('DOMContentLoaded', ()=>{ loadTrends(); renderProducts(); });
</script>
</body>
</html>
